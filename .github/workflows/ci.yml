name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled]

jobs:
  checks:
    if: github.event.action != 'labeled' || github.event.label.name == 'run-ci'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - task: typecheck
            command: bun run typecheck
          - task: test
            command: bun test
          - task: evals
            command: bun run src/evals/run.ts --sample 3
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Run ${{ matrix.task }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FINANCIAL_DATASETS_API_KEY: ${{ secrets.FINANCIAL_DATASETS_API_KEY }}
        run: |
          if [[ "${{ matrix.task }}" == "evals" ]] && [[ -z "$OPENAI_API_KEY" ]]; then
            echo "Skipping evals (OPENAI_API_KEY not set)"
            exit 0
          fi
          ${{ matrix.command }}
